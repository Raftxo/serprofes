<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Planes de IA</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section class="container">
    <h1>Nuestros Planes de IA</h1>

    <main class="cards">
      
      <!-- Plan Básico -->
      <article class="card">
        <h2>Plan Básico</h2>
        <p class="price">Gratis</p>
        <p class="desc">Ideal para probar nuestra IA con 50 mensajes al día.</p>
        <button class="btn">Elegir Plan</button>
      </article>

      <!-- Plan Pro -->
      <article class="card">
        <h2>Plan Pro</h2>
        <p class="price">15€ / mes</p>
        <p class="desc">Mensajes ilimitados y respuestas rápidas.</p>
        <button class="btn primary">Elegir Plan Pro</button>
      </article>

    </main>
  </section>

</body>
</html>
